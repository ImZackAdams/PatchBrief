<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="PatchBrief checkout cancellation page for on demand vulnerability reports."
    />
    <meta name="theme-color" content="#15211f" />
    <title>Checkout cancelled | PatchBrief</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f7f5ee;
        --paper: #ffffff;
        --ink: #16201e;
        --muted: #66746f;
        --line: #d9ddd4;
        --charcoal: #15211f;
        --teal: #0f766e;
        --mint: #55d6bd;
        --mint-soft: #e4f4ef;
        --radius: 8px;
        --shadow: 0 20px 48px rgba(21, 33, 31, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a:focus-visible {
        outline: 2px solid var(--mint);
        outline-offset: 3px;
      }

      .page {
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr;
      }

      header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: var(--charcoal);
        color: #ffffff;
      }

      .wrap {
        width: min(calc(100% - 32px), 1080px);
        margin: 0 auto;
      }

      .nav {
        display: flex;
        min-height: 4.25rem;
        align-items: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.68rem;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }

      .mark {
        position: relative;
        display: grid;
        width: 2.35rem;
        height: 2.35rem;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(159, 232, 220, 0.5);
        border-radius: var(--radius);
        background:
          radial-gradient(circle at 80% 18%, rgba(255, 255, 255, 0.34), transparent 26%),
          linear-gradient(135deg, #8df0dd 0%, #55d6bd 44%, #0f766e 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.45),
          0 10px 24px rgba(15, 118, 110, 0.26);
        color: #071f1c;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.86rem;
        font-weight: 900;
        line-height: 1;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.25);
      }

      .mark::before,
      .mark::after {
        position: absolute;
        content: "";
        pointer-events: none;
      }

      .mark::before {
        inset: 0.32rem;
        border: 1px solid rgba(7, 31, 28, 0.24);
        border-radius: 6px;
        background:
          linear-gradient(rgba(7, 31, 28, 0.26), rgba(7, 31, 28, 0.26)) 50% 38% / 58% 1px
            no-repeat,
          linear-gradient(rgba(7, 31, 28, 0.2), rgba(7, 31, 28, 0.2)) 50% 58% / 42% 1px
            no-repeat;
        opacity: 0.7;
      }

      .mark::after {
        right: 0.28rem;
        bottom: 0.28rem;
        width: 0.42rem;
        height: 0.42rem;
        border-top: 1px solid rgba(7, 31, 28, 0.46);
        border-left: 1px solid rgba(7, 31, 28, 0.46);
        background: rgba(255, 255, 255, 0.38);
        transform: rotate(45deg);
      }

      main {
        display: grid;
        align-items: center;
        padding: 3.25rem 0;
      }

      .panel {
        max-width: 680px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        padding: clamp(1.25rem, 4vw, 2rem);
        box-shadow: var(--shadow);
      }

      .kicker {
        display: inline-flex;
        margin: 0 0 1rem;
        border: 1px solid #b9d7d1;
        border-radius: var(--radius);
        background: var(--mint-soft);
        color: var(--teal);
        padding: 0.34rem 0.55rem;
        font-size: 0.9rem;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 0.8rem;
        font-size: clamp(2.1rem, 8vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 0 0 0.9rem;
        color: var(--muted);
      }

      .button {
        display: inline-flex;
        min-height: 2.95rem;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: var(--mint);
        color: #06221e;
        padding: 0.78rem 1rem;
        font-weight: 820;
        text-decoration: none;
        transition:
          background-color 150ms ease,
          transform 150ms ease;
      }

      .button:hover,
      .button:focus-visible {
        background: #82ead8;
        transform: translateY(-1px);
      }

      .actions {
        margin-top: 1.35rem;
      }

      @media (max-width: 720px) {
        .wrap {
          width: min(calc(100% - 24px), 1080px);
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="wrap nav">
          <a class="brand" href="/">
            <span class="mark" aria-hidden="true">PB</span>
            <span>PatchBrief</span>
          </a>
        </div>
      </header>

      <main>
        <div class="wrap">
          <section class="panel" aria-labelledby="payment-cancelled-title">
            <p class="kicker">Checkout</p>
            <h1 id="payment-cancelled-title">Checkout cancelled.</h1>
            <p>
              Your card was not charged. You can return to PatchBrief and run a report when you’re ready.
            </p>
            <div class="actions">
              <a class="button" href="/#signup-form">Return to report form</a>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
