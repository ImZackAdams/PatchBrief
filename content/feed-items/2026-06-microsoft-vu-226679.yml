title: 'VU#226679: Microsoft WinRE allows for bypass of UEFI/BIOS password enforcement'
summary: Overview Microsoft Windows Recovery Environment (WinRE) provides a mechanism
  for recovering and repairing Windows systems using an alternate boot environment.
  Under certain platform implementations, access to WinRE may allow an attacker to
  bypass firmware security controls, including administrator-configured UEFI/BIOS
  passwords. An attacker with physical or administrative access to a device may be
  able to leverage WinRE-related boot mechanisms to circumvent firmware protections
  and gain unauthorized access to system resources. Description Microsoft Windows
  versions 10 and 11 include the WinRE capability, a recovery platform that supports
  features such as the F11 recovery menu and the Reset this PC functionalities. WinRE
  is commonly used for system recovery, troubleshooting, and remote support scenarios.
