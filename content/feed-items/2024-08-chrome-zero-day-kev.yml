date: "2024-08-21"
type: KEV
signal: Known exploited
title: "CISA KEV adds actively exploited Chrome V8 type confusion zero-day"
summary: >
  Google confirmed exploitation in the wild for CVE-2024-7971, a type confusion
  vulnerability in the V8 JavaScript engine. CISA added it to the KEV catalog.
  All desktop Chrome versions before 128.0.6613.84 are affected.
vendor: Google
product: Chrome (desktop)
cve: CVE-2024-7971
operator_check: >
  Check browser fleet versions against Chrome 128.0.6613.84 or later.
  Verify update policy for laptops frequently off-network.
  Flag unmanaged browsers for manual follow-up.
why_it_matters: >
  Zero-day with active exploitation and a CISA KEV addition is a strong signal.
  Browser vulnerabilities affect every endpoint in a fleet. Unmanaged or infrequently
  updated endpoints are the primary risk surface.
