title: 'VU#615987: Missing IPsec Integrity Protection for IMS SIP Signaling in Verizon
  VoLTE Deployments'
summary: 'Overview VoLTE deployments on Verizon’s IMS network have operated without
  negotiated SIP integrity protection. In observed test conditions, SIP signaling—including
  registration, call setup, and messaging—traveled without IPsec ESP encapsulation
  and without SIP Security Agreement headers, exposing it to interception and modification
  by on-path attackers. Recent carrier configuration updates, including Apple’s iOS
  26.5 carrier bundle released on May 11, 2026, include IMS IPsec–related settings.
  However, such configuration entries do not confirm active deployment, successful
  negotiation, or functional protection in production. Description CVE-2026-10629
  Verizon IMS deployments were observed transmitting SIP signaling without integrity
  protection. REGISTER exchanges lacked Security-Client, Security-Server, and Security-Verify
  headers, and no... Related CVEs: CVE-2026-10629.'
