title: 'VU#380058: SignalRGB kernel driver contains improper access control and IOCTL
  vulnerabilities'
summary: 'Overview The SignalRGB kernel driver, SignalIo.sys , contains two vulnerabilities
  involving improper access control and unsafe memory handling. The device object
  is created with an overly permissive Discretionary Access Control List (DACL) that
  allows user-mode processes to access privileged hardware operations through input/output
  control (IOCTL) commands. Additionally, several IOCTL handlers are susceptible to
  NULL pointer dereference conditions, which further enables low-privilege users to
  trigger kernel crashes and cause Denial of Service (DoS). Version 1.3.7.0 of the
  SignalRGB driver remediates these vulnerabilities. Description SignalRGB is a Windows
  application used for RGB lighting control and hardware monitoring. Its kernel component,
  SignalIo.sys , provides the low-level interfaces required to access and interact
  with hardware... Related CVEs: CVE-2026-8049, CVE-2026-8050.'
