title: 'VU#873170: Collibra Agent contains improper authentication and path traversal
  vulnerabilities'
summary: 'Overview The Collibra Platform Agent contains vulnerabilities that can be
  chained by a remote, unauthenticated attacker to achieve remote code execution.
  An attacker can exploit these issues by uploading a crafted ZIP archive that writes
  attacker-controlled files to arbitrary locations on the server once extracted, resulting
  in code execution. Description Collibra Platform (CP) and Collibra Platform Self-Hosted
  (CPSH), an enterprise grade, cloud-based platform designed to help organizations
  locate, understand, trust, and manage their data assets. The Collibra Agent of CP
  and CPSH that is installed on the host system is an independent service that listens
  on different port than the web interface and have the following vulnerabilities.
  CVE-2026-10622 Privileged REST endpoints exposed under /rest/* do not properly enforce
  authentication or... Related CVEs: CVE-2026-10621, CVE-2026-10622.'
