title: 'VU#457458: Vendor-signed UEFI applications found vulnerable to Secure Boot
  bypass'
summary: Overview Multiple vendor-signed UEFI applications are vulnerable to Secure
  Boot bypass via a "Bring Your Own Vulnerable Driver" (BYOVD)-style attack. If a
  target system trusts the affected vendor’s certificate, an attacker can exploit
  these applications to execute arbitrary code during the early pre-boot phase before
  the operating system initializes. To mitigate this risk, system administrators should
  apply updates to the UEFI Forbidden Signature Database (DBX) that revoke trust in
  the affected vendor-signed binaries, preventing these vulnerable applications from
  executing during the boot process. Description The Unified Extensible Firmware Interface
  ( UEFI ) standard defines the modern firmware architecture used to initialize hardware
  and transfer control to the operating system during system startup. On systems with
  Secure Boot...
