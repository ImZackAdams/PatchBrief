title: 'VU#595768: Securly Chrome Extension contains multiple weak encryption and
  access control vulnerabilities'
summary: 'Overview Version 3.0.7 of the Securly Chrome Extension contains multiple
  vulnerabilities involving insecure data transmission, weak cryptography, and improper
  access control. These issues may expose sensitive filtering rules, enable the manipulation
  of downloaded configuration files, and allow unauthenticated access to protected
  resources. An attacker could exploit these weakness to steal configuration information,
  induce a Denial of Service (DoS), or modify content blocking rules for student users.
  Description The Securly Chrome Extension is a browser add-on commonly used in K–12
  school-managed Chromebooks to enforce internet safety policies, filter or block
  websites, and provide activity monitoring for students. It is an element of the
  Securly classroom management platform, which helps schools comply with web filtering
  requirements and... Related CVEs: CVE-2026-8874, CVE-2026-8876, CVE-2026-8878, CVE-2026-8879.'
