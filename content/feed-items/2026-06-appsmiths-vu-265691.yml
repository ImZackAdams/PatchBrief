title: 'VU#265691: Appsmiths SQL Query autocomplete renderer contains a cross site
  scripting vulnerability'
summary: 'Overview A stored cross-site scripting (XSS) vulnerability has been discovered
  in Appsmith, specifically in the CodeMirror based SQL query editor’s autocomplete
  renderer. CVE-2026-7299 has been assigned to track the vulnerability. An attacker
  with developer level access to a shared PostgreSQL datasource can inject arbitrary
  JavaScript by creating malicious database objects whose names contain XSS payloads.
  Successful exploitation leads to arbitrary JavaScript execution in the browser of
  any workspace member who triggers SQL autocomplete, enabling session hijacking,
  privilege escalation, or credential theft. Version 2.1 of Appsmith fixes CVE-2026-7299.
  Description Appsmith is an open source, low code platform intended to allow developers
  to build internal tools, dashboards, and applications using a UI builder, database
  and API... Related CVEs: CVE-2026-7299.'
