title: 'VU#936962: Multiple file parsing vulnerabilities in FastStone Image Viewer
  8.3.0.0'
summary: 'Overview Two vulnerabilities have been identified in FastStone Image Viewer
  8.3 that may allow remote code execution or control-flow corruption when processing
  specially crafted image files. The affected components include the JPEG 2000 (JP2)
  parser and the PSD file parser. An attacker can exploit these vulnerabilities by
  causing the application to automatically or interactively process malicious image
  files. Description FastStone Image Viewer is a software tool for browsing, editing,
  and managing images, offering features like full‑screen viewing, batch processing,
  red‑eye removal, and a wide range of editing effects. It supports virtually all
  major image and RAW formats and includes conveniences like slideshows, comparison
  tools, scanner support, and screen capture. CVE-2026-30040 A critical heap-based
  buffer overflow vulnerability... Related CVEs: CVE-2026-30040, CVE-2026-30041.'
