name: Generate Watchlist Brief (Manual)

on:
  workflow_dispatch:
    inputs:
      watchlist_file:
        description: "Path to watchlist YAML file (e.g. watchlists/sample-watchlist.yml)"
        required: true
        default: "watchlists/sample-watchlist.yml"
      source_file:
        description: "Path to normalized advisory JSON (leave blank to use sample data)"
        required: false
        default: "data/normalized/cisa-kev.json"
      output_name:
        description: "Output filename (e.g. brief-june-2026.html)"
        required: true
        default: "brief.html"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        run: |
          mkdir -p reports
          python -m patchbrief.cli generate-brief \
            --watchlist "${{ github.event.inputs.watchlist_file }}" \
            --source "${{ github.event.inputs.source_file }}" \
            --out "reports/${{ github.event.inputs.output_name }}"

      - name: Upload brief
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-brief
          path: "reports/${{ github.event.inputs.output_name }}"
          retention-days: 30
