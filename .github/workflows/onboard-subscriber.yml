name: Onboard Subscriber

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Subscriber email address"
        required: true
      name:
        description: "Watchlist slug (lowercase, hyphens — e.g. acme-corp)"
        required: true
      terms:
        description: "Comma-separated watchlist terms (e.g. Microsoft,VMware,Cisco IOS)"
        required: true
      cadence:
        description: "Delivery cadence"
        required: true
        default: "important_only"
        type: choice
        options:
          - important_only
          - weekly
          - monthly

jobs:
  onboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo (code)
        uses: actions/checkout@v4

      - name: Checkout subscriber watchlists (private)
        uses: actions/checkout@v4
        with:
          repository: ImZackAdams/PatchBrief-internal
          token: ${{ secrets.INTERNAL_REPO_TOKEN }}
          path: internal

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Create watchlist YAML
        run: |
          mkdir -p internal/watchlists
          python -m patchbrief.cli create-watchlist \
            --name "${{ github.event.inputs.name }}" \
            --email "${{ github.event.inputs.email }}" \
            --terms "${{ github.event.inputs.terms }}" \
            --cadence "${{ github.event.inputs.cadence }}" \
            --out "internal/watchlists/${{ github.event.inputs.name }}.yml"

      - name: Commit watchlist to private repo
        run: |
          cd internal
          git config user.name "PatchBrief Bot"
          git config user.email "bot@patchbrief.org"
          git add watchlists/
          git diff --cached --quiet || git commit -m "Add subscriber: ${{ github.event.inputs.name }}"
          git push

      - name: Ingest CISA KEV
        run: python -m patchbrief.cli ingest-cisa-kev

      - name: Send first brief
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python -m patchbrief.cli send-brief \
            --watchlist "internal/watchlists/${{ github.event.inputs.name }}.yml" \
            --source data/normalized/cisa-kev.json \
            --from-email "briefs@patchbrief.org"
