name: Build feed

on:
  schedule:
    # Daily at 09:00 UTC — ingest + build
    - cron: "0 9 * * *"
    # Weekly digest every Monday at 10:00 UTC (after daily build)
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Ingest look-back window in days"
        default: "3"
        required: false
      kev_only:
        description: "Only ingest CISA KEV (skip NVD)"
        type: boolean
        default: false
      sources:
        description: "Comma-separated sources: cisa_kev,msrc,github_advisory,nvd,cert_vu,exploitdb"
        default: "cisa_kev,msrc,github_advisory,nvd,cert_vu,exploitdb"
        required: false
      digest_only:
        description: "Generate digest only, skip ingest + build"
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "content/feed-items/**"
      - "templates/**"
      - "patchbrief/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Validate content
        run: python -m patchbrief.cli validate

      # -----------------------------------------------------------------------
      # Ingest — runs on schedule and manual dispatch (not on content pushes)
      # -----------------------------------------------------------------------
      - name: Ingest new vulnerabilities
        if: >
          github.event_name == 'schedule' && github.event.schedule == '0 9 * * *' ||
          github.event_name == 'workflow_dispatch' && github.event.inputs.digest_only != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          SOURCES="${{ github.event.inputs.sources || 'cisa_kev,msrc,github_advisory,nvd,cert_vu,exploitdb' }}"
          KEV_FLAG=""
          if [ "${{ github.event.inputs.kev_only }}" = "true" ]; then
            KEV_FLAG="--kev-only"
          fi
          python -m patchbrief.cli ingest --days "$DAYS" --sources "$SOURCES" $KEV_FLAG

      # -----------------------------------------------------------------------
      # Build — always runs except digest-only dispatch
      # -----------------------------------------------------------------------
      - name: Build feed
        if: github.event.inputs.digest_only != 'true'
        env:
          PATCHBRIEF_STRIPE_PRO_MONTHLY_URL: ${{ secrets.PATCHBRIEF_STRIPE_PRO_MONTHLY_URL }}
          PATCHBRIEF_STRIPE_PRO_YEARLY_URL: ${{ secrets.PATCHBRIEF_STRIPE_PRO_YEARLY_URL }}
          PATCHBRIEF_STRIPE_TEAM_MONTHLY_URL: ${{ secrets.PATCHBRIEF_STRIPE_TEAM_MONTHLY_URL }}
          PATCHBRIEF_STRIPE_TEAM_YEARLY_URL: ${{ secrets.PATCHBRIEF_STRIPE_TEAM_YEARLY_URL }}
        run: python -m patchbrief.cli build-feed

      # -----------------------------------------------------------------------
      # Weekly digest — runs every Monday and on manual trigger
      # -----------------------------------------------------------------------
      - name: Generate weekly digest
        if: >
          github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1' ||
          github.event_name == 'workflow_dispatch' && github.event.inputs.digest_only == 'true'
        env:
          PATCHBRIEF_STRIPE_PRO_MONTHLY_URL: ${{ secrets.PATCHBRIEF_STRIPE_PRO_MONTHLY_URL }}
          PATCHBRIEF_STRIPE_PRO_YEARLY_URL: ${{ secrets.PATCHBRIEF_STRIPE_PRO_YEARLY_URL }}
          PATCHBRIEF_STRIPE_TEAM_MONTHLY_URL: ${{ secrets.PATCHBRIEF_STRIPE_TEAM_MONTHLY_URL }}
          PATCHBRIEF_STRIPE_TEAM_YEARLY_URL: ${{ secrets.PATCHBRIEF_STRIPE_TEAM_YEARLY_URL }}
        run: |
          # Derive issue number from weeks since epoch
          ISSUE=$(python3 -c "import datetime; print((datetime.date.today() - datetime.date(2025,1,1)).days // 7 + 1)")
          python -m patchbrief.cli digest \
            --days 7 \
            --max-items 8 \
            --issue "$ISSUE" \
            --label "Weekly" \
            --output "digest-latest.html"
          echo "Generated digest-latest.html (issue $ISSUE)"

      # -----------------------------------------------------------------------
      # Commit all generated files
      # -----------------------------------------------------------------------
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            feed.html \
            rss.xml \
            sitemap.xml \
            feed.json \
            items/ \
            content/feed-items/ \
            content/processed-state.json \
            content/source-status.json \
            digest-latest.html \
            2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild feed [skip ci]"
            git push
          fi
