name: Build feed

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "content/feed-items/**"
      - "templates/**"
      - "patchbrief/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build feed
        run: python -m patchbrief.cli build-feed

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.html rss.xml items/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild feed [skip ci]"
            git push
          fi
