name: Ingest CISA KEV

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest CISA KEV
        run: python -m patchbrief.cli ingest-cisa-kev

      - name: Upload normalized data
        uses: actions/upload-artifact@v4
        with:
          name: cisa-kev-normalized
          path: data/normalized/cisa-kev.json
          retention-days: 7
